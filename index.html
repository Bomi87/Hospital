<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Search Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #222;
    }

    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 20px 16px 36px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      padding: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 180px;
      flex: 1;
    }

    .field.small {
      max-width: 180px;
      flex: 0 0 180px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }

    input {
      width: 100%;
      height: 42px;
      padding: 10px 12px;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #1f5eff;
      box-shadow: 0 0 0 3px rgba(31,94,255,0.12);
    }

    button {
      height: 42px;
      padding: 0 18px;
      border: none;
      border-radius: 10px;
      background: #1f5eff;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { opacity: 0.93; }
    button.secondary { background: #6b7280; }

    .btn-area {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .msg {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .msg.error { color: #c62828; }
    .msg.success { color: #177245; }

    .hidden { display: none; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .info-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
    }

    .info-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 14px;
      font-weight: 600;
      word-break: break-word;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(680px, 1.15fr) minmax(520px, 0.85fr);
      gap: 16px;
      margin-top: 16px;
      align-items: start;
    }

    .left-col,
    .right-col {
      min-width: 0;
    }

    .right-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .table-wrap {
      overflow-y: auto;
      overflow-x: hidden;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      max-height: 720px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 10px;
      text-align: left;
      font-size: 13px;
      vertical-align: top;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    th {
      background: #f3f6fb;
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
    }

    #resultTable th:nth-child(1),
    #resultTable td:nth-child(1) { width: 40%; }

    #resultTable th:nth-child(2),
    #resultTable td:nth-child(2) { width: 16%; }

    #resultTable th:nth-child(3),
    #resultTable td:nth-child(3) { width: 12%; }

    #resultTable th:nth-child(4),
    #resultTable td:nth-child(4) { width: 15%; }

    #resultTable th:nth-child(5),
    #resultTable td:nth-child(5) {
      width: 8%;
      text-align: center;
    }

    #resultTable th:nth-child(6),
    #resultTable td:nth-child(6) {
      width: 9%;
      text-align: center;
    }

    tr.clickable-row { cursor: pointer; }
    tr.clickable-row:hover td { background: #f8fbff; }
    tr.active-row td { background: #eef4ff !important; }

    #map {
      width: 100%;
      height: 690px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      overflow: hidden;
      background: #fff;
    }

    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: #e8f7ee;
      color: #177245;
      white-space: nowrap;
    }

    .pill.top {
      background: #ecfccb;
      color: #3f6212;
    }

    .details-box,
    .wiki-box {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      padding: 14px;
    }

    .details-box {
      margin-top: 14px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .details-line,
    .wiki-line {
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .wiki-summary {
      font-size: 14px;
      line-height: 1.8;
      word-break: break-word;
      white-space: normal;
    }

    .wiki-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #1f5eff;
      text-decoration: none;
    }

    .wiki-link:hover {
      text-decoration: underline;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .leaflet-popup-content {
      font-size: 13px;
      line-height: 1.5;
      max-width: 280px;
      word-break: break-word;
    }

    .marker-icon-wrap {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
    }

    .marker-default { background: #2563eb; }
    .marker-top { background: #a3e635; }

    .airport-marker {
      font-size: 22px;
      line-height: 22px;
      text-align: center;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.35));
    }

    @media (max-width: 1180px) {
      .content-grid {
        grid-template-columns: 1fr;
      }

      #map {
        height: 520px;
      }
    }

    @media (max-width: 768px) {
      .wrap {
        padding: 14px 10px 24px;
      }

      h1 {
        font-size: 24px;
      }

      .field, .field.small {
        min-width: 100%;
        max-width: 100%;
        flex: 1 1 100%;
      }

      button {
        width: 100%;
      }

      .info-grid {
        grid-template-columns: repeat(2, minmax(0,1fr));
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        table-layout: auto;
        min-width: 700px;
      }

      #map {
        height: 430px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="card" id="loginCard">
      <h1>Hospital Search</h1>
      <div class="sub">비밀번호 입력 후 공항 주변 병원을 조회합니다.</div>

      <div class="row">
        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter password"
            onkeydown="if(event.key==='Enter') login();"
          />
        </div>
      </div>

      <div class="btn-area">
        <button onclick="login()">Enter</button>
      </div>

      <div id="loginMsg" class="msg"></div>
    </div>

    <div class="card hidden" id="searchCard">
      <div class="top-bar">
        <div>
          <h1 style="margin-bottom:6px;">Hospital Search Map</h1>
          <div class="sub" style="margin-bottom:0;">
            ICAO 기준 반경 내 병원 리스트와 지도를 함께 표시합니다.
          </div>
        </div>
        <div>
          <button class="secondary" onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="row" style="margin-top:16px;">
        <div class="field small">
          <label for="icao">ICAO CODE</label>
          <input
            type="text"
            id="icao"
            placeholder="ex) RKSS"
            maxlength="4"
            oninput="this.value = this.value.toUpperCase();"
            onkeydown="if(event.key==='Enter') searchHospitals();"
          />
        </div>

        <div class="field small">
          <label for="radius">Radius (km)</label>
          <input
            type="number"
            id="radius"
            placeholder="20"
            value="20"
            min="1"
            max="50"
            onkeydown="if(event.key==='Enter') searchHospitals();"
          />
        </div>
      </div>

      <div class="btn-area">
        <button onclick="searchHospitals()">Search</button>
      </div>

      <div id="searchMsg" class="msg"></div>

      <div class="info-grid" id="resultInfo" style="display:none;">
        <div class="info-box">
          <div class="info-label">ICAO</div>
          <div class="info-value" id="infoIcao">-</div>
        </div>
        <div class="info-box">
          <div class="info-label">LAT</div>
          <div class="info-value" id="infoLat">-</div>
        </div>
        <div class="info-box">
          <div class="info-label">LNG</div>
          <div class="info-value" id="infoLng">-</div>
        </div>
        <div class="info-box">
          <div class="info-label">CACHE</div>
          <div class="info-value" id="infoCache">-</div>
        </div>
      </div>

      <div class="content-grid">
        <div class="left-col">
          <div class="table-wrap">
            <table id="resultTable">
              <thead>
                <tr>
                  <th>NAME</th>
                  <th>DISTANCE</th>
                  <th>RATING</th>
                  <th>RATINGS_TOTAL</th>
                  <th>UNIV</th>
                  <th>TOP</th>
                </tr>
              </thead>
              <tbody id="resultBody">
                <tr>
                  <td colspan="6">No data</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="details-box" id="detailsBox">
            <div class="section-title">Hospital Details</div>
            <div class="details-line">병원을 클릭하면 전체주소 / 전화번호 / 운영시간이 표시됩니다.</div>
          </div>
        </div>

        <div class="right-col">
          <div id="map"></div>

          <div class="wiki-box" id="wikiBox">
            <div class="section-title">위키백과</div>
            <div class="wiki-line">병원을 클릭하면 한국어 위키백과 요약이 표시됩니다.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyxm2L6ziTu2LNX8S02P0wszRo2xFVjhlUCG4XG3ujxwxuHpHLJYWzMWflXZ9ywnuAc/exec';

    let map;
    let airportMarker = null;
    let radiusCircle = null;
    let hospitalMarkers = [];
    let currentResults = [];

    function initMap() {
      if (map) return;

      map = L.map('map').setView([37.5665, 126.9780], 10);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
    }

    function getAirportIcon() {
      return L.divIcon({
        className: '',
        html: `<div class="airport-marker">✈️</div>`,
        iconSize: [26, 26],
        iconAnchor: [13, 13],
        popupAnchor: [0, -10]
      });
    }

    function getHospitalIcon(isTop) {
      const cls = isTop ? 'marker-icon-wrap marker-top' : 'marker-icon-wrap marker-default';

      return L.divIcon({
        className: '',
        html: `<div class="${cls}"></div>`,
        iconSize: [20, 20],
        iconAnchor: [10, 10],
        popupAnchor: [0, -10]
      });
    }

    function calculateHospitalScore(item) {
      const rating = Number(item.rating || 0);
      const ratingsTotal = Number(item.ratings_total || 0);
      return rating * Math.log(ratingsTotal + 1);
    }

    function getTopHospitalIndexes(results) {
      if (!results || results.length === 0) return new Set();

      const scored = results.map((item, index) => ({
        index,
        score: calculateHospitalScore(item)
      }));

      scored.sort((a, b) => b.score - a.score);

      const topCount = Math.max(1, Math.ceil(results.length * 0.3));
      return new Set(scored.slice(0, topCount).map(x => x.index));
    }

    async function postToServer(payload) {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();

      try {
        return JSON.parse(text);
      } catch (err) {
        throw new Error('응답 파싱 실패: ' + text);
      }
    }

    async function login() {
      const passwordInput = document.getElementById('password');
      const msg = document.getElementById('loginMsg');
      const password = passwordInput.value.trim();

      msg.className = 'msg';
      msg.textContent = '';

      if (!password) {
        msg.className = 'msg error';
        msg.textContent = '비밀번호를 입력해 주세요.';
        return;
      }

      try {
        msg.className = 'msg success';
        msg.textContent = '확인 중...';

        const data = await postToServer({
          action: 'login',
          password
        });

        if (!data.success) {
          msg.className = 'msg error';
          msg.textContent = data.message || '로그인 실패';
          return;
        }

        localStorage.setItem('hospital_password', password);
        showSearchView();

      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = '로그인 중 오류가 발생했습니다.';
      }
    }

    function logout() {
      localStorage.removeItem('hospital_password');
      document.getElementById('password').value = '';
      document.getElementById('icao').value = '';
      document.getElementById('radius').value = '20';
      document.getElementById('searchMsg').textContent = '';
      document.getElementById('loginMsg').textContent = '';
      document.getElementById('resultInfo').style.display = 'none';
      currentResults = [];
      resetTable();
      clearMapObjects();
      resetDetailsBox();
      resetWikiBox();
      showLoginView();
    }

    async function searchHospitals() {
      const password = localStorage.getItem('hospital_password') || '';
      const icao = document.getElementById('icao').value.trim().toUpperCase();
      const radius = document.getElementById('radius').value.trim();
      const msg = document.getElementById('searchMsg');

      msg.className = 'msg';
      msg.textContent = '';

      if (!password) {
        msg.className = 'msg error';
        msg.textContent = '로그인이 필요합니다.';
        showLoginView();
        return;
      }

      if (!icao) {
        msg.className = 'msg error';
        msg.textContent = 'ICAO CODE를 입력해 주세요.';
        return;
      }

      resetTable();
      clearMapObjects();
      resetDetailsBox();
      resetWikiBox();

      try {
        msg.className = 'msg success';
        msg.textContent = '조회 중...';

        const data = await postToServer({
          action: 'search',
          password,
          icao,
          radius
        });

        if (!data.success) {
          msg.className = 'msg error';
          msg.textContent = data.message || '조회 실패';
          return;
        }

        currentResults = data.results || [];

        updateInfo(data);
        renderTable(currentResults);
        renderMap(data);

        const count = currentResults.length;
        const cachedText = data.cached ? ' / cache' : '';
        msg.className = 'msg success';
        msg.textContent = `${count}건 조회 완료${cachedText}`;

      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = '조회 중 오류가 발생했습니다.';
      }
    }

    async function loadHospitalDetails(index, openPopupAfterLoad = true) {
      const item = currentResults[index];
      if (!item || !item.place_id) return;

      const password = localStorage.getItem('hospital_password') || '';
      const box = document.getElementById('detailsBox');
      const marker = hospitalMarkers[index];
      const isTop = getTopHospitalIndexes(currentResults).has(index);

      if (item._detailsLoaded) {
        renderDetailsBox(item);

        if (marker && openPopupAfterLoad) {
          marker.setPopupContent(buildPopupHtml(item, isTop));
          marker.openPopup();
        }

        await loadWikipediaSummary(item);
        return;
      }

      box.innerHTML = `
        <div class="section-title">${escapeHtml(item.name || 'Hospital Details')}</div>
        <div class="details-line">상세정보 불러오는 중...</div>
      `;

      showWikiLoading(item.name || '');

      if (marker) {
        marker.setPopupContent(`
          <div>
            <div style="font-weight:700; margin-bottom:6px;">
              ${escapeHtml(item.name || '')}
              ${isTop ? '<span style="display:inline-block;margin-left:6px;padding:2px 6px;border-radius:999px;background:#ecfccb;color:#3f6212;font-size:11px;font-weight:700;">TOP</span>' : ''}
            </div>
            <div>상세정보 불러오는 중...</div>
          </div>
        `);

        if (openPopupAfterLoad) {
          marker.openPopup();
        }
      }

      try {
        const data = await postToServer({
          action: 'details',
          password,
          place_id: item.place_id
        });

        if (!data.success) {
          box.innerHTML = `
            <div class="section-title">${escapeHtml(item.name || 'Hospital Details')}</div>
            <div class="details-line">상세정보 조회 실패</div>
          `;

          if (marker) {
            marker.setPopupContent(`
              <div>
                <div style="font-weight:700; margin-bottom:6px;">${escapeHtml(item.name || '')}</div>
                <div>상세정보 조회 실패</div>
              </div>
            `);
          }

          await loadWikipediaSummary(item);
          return;
        }

        item.full_address = data.details.full_address || item.address || '';
        item.phone = data.details.phone || '';
        item.opening_hours = data.details.opening_hours || '';
        item.google_maps_url = data.details.google_maps_url || '';
        item.website = data.details.website || '';
        item._detailsLoaded = true;

        renderDetailsBox(item);

        if (marker) {
          marker.setPopupContent(buildPopupHtml(item, isTop));

          if (openPopupAfterLoad) {
            marker.openPopup();
          }
        }

        await loadWikipediaSummary(item);

      } catch (err) {
        box.innerHTML = `
          <div class="section-title">${escapeHtml(item.name || 'Hospital Details')}</div>
          <div class="details-line">상세정보 조회 중 오류 발생</div>
        `;

        if (marker) {
          marker.setPopupContent(`
            <div>
              <div style="font-weight:700; margin-bottom:6px;">${escapeHtml(item.name || '')}</div>
              <div>상세정보 조회 중 오류 발생</div>
            </div>
          `);
        }

        await loadWikipediaSummary(item);
      }
    }

    function renderDetailsBox(item) {
      const box = document.getElementById('detailsBox');
      box.innerHTML = `
        <div class="section-title">${escapeHtml(item.name || 'Hospital Details')}</div>
        <div class="details-line"><b>전체 주소:</b> ${escapeHtml(item.full_address || item.address || '정보 없음')}</div>
        <div class="details-line"><b>전화번호:</b> ${escapeHtml(item.phone || '정보 없음')}</div>
        <div class="details-line"><b>운영시간:</b> ${escapeHtml(item.opening_hours || '정보 없음')}</div>
      `;
    }

    function resetDetailsBox() {
      const box = document.getElementById('detailsBox');
      box.innerHTML = `
        <div class="section-title">Hospital Details</div>
        <div class="details-line">병원을 클릭하면 전체주소 / 전화번호 / 운영시간이 표시됩니다.</div>
      `;
    }

    function resetWikiBox() {
      const box = document.getElementById('wikiBox');
      box.innerHTML = `
        <div class="section-title">위키백과</div>
        <div class="wiki-line">병원을 클릭하면 한국어 위키백과 요약이 표시됩니다.</div>
      `;
    }

    function showWikiLoading(name) {
      const box = document.getElementById('wikiBox');
      box.innerHTML = `
        <div class="section-title">위키백과</div>
        <div class="wiki-line"><b>${escapeHtml(name || '')}</b></div>
        <div class="wiki-line">위키백과 정보 불러오는 중...</div>
      `;
    }

    function normalizeHospitalName(name) {
      return String(name || '')
        .replace(/\s*\([^)]*\)\s*/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function getWikipediaCandidates(name) {
      const base = normalizeHospitalName(name);
      const candidates = [];

      if (base) candidates.push(base);

      if (base.includes('순천향대학교 부속 부천병원')) {
        candidates.push('순천향대학교 부속 부천병원');
      }

      if (base.includes('서울대학교병원')) candidates.push('서울대학교병원');
      if (base.includes('이대서울병원')) candidates.push('이대서울병원');
      if (base.includes('부천병원')) candidates.push('부천병원');

      return [...new Set(candidates.filter(Boolean))];
    }

    async function fetchWikipediaSummaryByTitle(title) {
      const url = `https://ko.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
      const res = await fetch(url, {
        headers: {
          'Accept': 'application/json'
        }
      });

      if (!res.ok) {
        throw new Error(`Wikipedia ${res.status}`);
      }

      const data = await res.json();

      if (!data || data.type === 'https://mediawiki.org/wiki/HyperSwitch/errors/not_found') {
        throw new Error('not found');
      }

      if (!data.extract || !String(data.extract).trim()) {
        throw new Error('empty extract');
      }

      return {
        title: data.title || title,
        extract: data.extract || '',
        url: data.content_urls?.desktop?.page || ''
      };
    }

    async function loadWikipediaSummary(item) {
      const box = document.getElementById('wikiBox');
      if (!item) {
        resetWikiBox();
        return;
      }

      if (item._wikiLoaded) {
        renderWikiBox(item);
        return;
      }

      showWikiLoading(item.name || '');

      const candidates = getWikipediaCandidates(item.name || '');

      for (const title of candidates) {
        try {
          const wiki = await fetchWikipediaSummaryByTitle(title);
          item.wiki_title = wiki.title || '';
          item.wiki_summary = wiki.extract || '';
          item.wiki_url = wiki.url || '';
          item._wikiLoaded = true;
          renderWikiBox(item);
          return;
        } catch (err) {}
      }

      item.wiki_title = '';
      item.wiki_summary = '';
      item.wiki_url = '';
      item._wikiLoaded = true;
      renderWikiBox(item);
    }

    function renderWikiBox(item) {
      const box = document.getElementById('wikiBox');

      if (!item.wiki_summary) {
        box.innerHTML = `
          <div class="section-title">위키백과</div>
          <div class="wiki-line"><b>${escapeHtml(item.name || '')}</b></div>
          <div class="wiki-line">한국어 위키백과 요약 정보를 찾지 못했습니다.</div>
        `;
        return;
      }

      box.innerHTML = `
        <div class="section-title">위키백과</div>
        <div class="wiki-line"><b>${escapeHtml(item.wiki_title || item.name || '')}</b></div>
        <div class="wiki-summary">${escapeHtml(item.wiki_summary)}</div>
        ${item.wiki_url ? `<a class="wiki-link" href="${escapeHtml(item.wiki_url)}" target="_blank" rel="noopener noreferrer">위키백과에서 열기</a>` : ''}
      `;
    }

    function updateInfo(data) {
      document.getElementById('resultInfo').style.display = 'grid';
      document.getElementById('infoIcao').textContent = data.icao || '-';
      document.getElementById('infoLat').textContent = data.lat ?? '-';
      document.getElementById('infoLng').textContent = data.lng ?? '-';
      document.getElementById('infoCache').textContent = data.cached ? 'YES' : 'NO';
    }

    function renderTable(results) {
      const tbody = document.getElementById('resultBody');
      tbody.innerHTML = '';

      if (!results || results.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6">No results</td></tr>';
        return;
      }

      const topIndexes = getTopHospitalIndexes(results);

      results.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.className = 'clickable-row';

        const univ = String(item.is_university || '').trim() === 'O'
          ? '<span class="pill">O</span>'
          : '';

        const topBadge = topIndexes.has(index)
          ? '<span class="pill top">TOP</span>'
          : '';

        tr.innerHTML = `
          <td>
            <div style="font-weight:700; margin-bottom:4px;">${escapeHtml(item.name || '')}</div>
            <div style="font-size:12px; color:#666;">${escapeHtml(item.address || '')}</div>
          </td>
          <td>${escapeHtml(String(item.distance_km || ''))} km</td>
          <td>${escapeHtml(String(item.rating || ''))}</td>
          <td>${escapeHtml(String(item.ratings_total || ''))}</td>
          <td>${univ}</td>
          <td>${topBadge}</td>
        `;

        tr.addEventListener('click', async () => {
          await focusHospital(index);
        });

        tbody.appendChild(tr);
      });
    }

    function buildPopupHtml(item, isTop) {
      return `
        <div>
          <div style="font-weight:700; margin-bottom:6px;">
            ${escapeHtml(item.name || '')}
            ${isTop ? '<span style="display:inline-block;margin-left:6px;padding:2px 6px;border-radius:999px;background:#ecfccb;color:#3f6212;font-size:11px;font-weight:700;">TOP</span>' : ''}
          </div>
          <div><b>Distance:</b> ${escapeHtml(String(item.distance_km || ''))} km</div>
          <div><b>Rating:</b> ${escapeHtml(String(item.rating || ''))}</div>
          <div><b>Ratings Total:</b> ${escapeHtml(String(item.ratings_total || ''))}</div>
          <div style="margin-top:4px;"><b>Address:</b> ${escapeHtml(item.full_address || item.address || '')}</div>
          <div><b>Phone:</b> ${escapeHtml(item.phone || '정보 없음')}</div>
          <div><b>Hours:</b> ${escapeHtml(item.opening_hours || '정보 없음')}</div>
        </div>
      `;
    }

    function renderMap(data) {
      initMap();

      const centerLat = Number(data.lat);
      const centerLng = Number(data.lng);
      const radiusKm = Number(data.radius || 20);
      const results = data.results || [];
      const topIndexes = getTopHospitalIndexes(results);

      airportMarker = L.marker([centerLat, centerLng], {
        icon: getAirportIcon()
      }).addTo(map).bindPopup(`<b>${escapeHtml(data.icao || 'AIRPORT')}</b><br>Airport Center`);

      radiusCircle = L.circle([centerLat, centerLng], {
        radius: radiusKm * 1000
      }).addTo(map);

      const bounds = L.latLngBounds([[centerLat, centerLng]]);

      results.forEach((item, index) => {
        const lat = Number(item.lat);
        const lng = Number(item.lng);
        if (!isFinite(lat) || !isFinite(lng)) return;

        const isTop = topIndexes.has(index);

        const marker = L.marker([lat, lng], {
          icon: getHospitalIcon(isTop)
        }).addTo(map);

        marker.on('click', async () => {
          highlightRow(index);
          await loadHospitalDetails(index, true);
        });

        hospitalMarkers.push(marker);
        bounds.extend([lat, lng]);
      });

      map.fitBounds(bounds, { padding: [30, 30] });

      setTimeout(() => {
        map.invalidateSize();
      }, 200);
    }

    async function focusHospital(index) {
      highlightRow(index);

      if (!hospitalMarkers[index]) return;
      const marker = hospitalMarkers[index];
      const latlng = marker.getLatLng();

      map.setView(latlng, Math.max(map.getZoom(), 13), { animate: true });
      await loadHospitalDetails(index, true);
    }

    function highlightRow(index) {
      const rows = document.querySelectorAll('#resultBody tr');
      rows.forEach((row, i) => {
        if (i === index) row.classList.add('active-row');
        else row.classList.remove('active-row');
      });
    }

    function clearMapObjects() {
      if (!map) return;

      if (airportMarker) {
        map.removeLayer(airportMarker);
        airportMarker = null;
      }

      if (radiusCircle) {
        map.removeLayer(radiusCircle);
        radiusCircle = null;
      }

      hospitalMarkers.forEach(marker => map.removeLayer(marker));
      hospitalMarkers = [];
    }

    function resetTable() {
      const tbody = document.getElementById('resultBody');
      tbody.innerHTML = '<tr><td colspan="6">No data</td></tr>';
    }

    function showLoginView() {
      document.getElementById('loginCard').classList.remove('hidden');
      document.getElementById('searchCard').classList.add('hidden');
    }

    function showSearchView() {
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('searchCard').classList.remove('hidden');
      initMap();

      setTimeout(() => {
        map.invalidateSize();
      }, 200);

      document.getElementById('icao').focus();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    window.addEventListener('load', () => {
      const savedPassword = localStorage.getItem('hospital_password');
      if (savedPassword) showSearchView();
      else showLoginView();
    });
  </script>
</body>
</html>
