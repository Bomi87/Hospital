<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Search</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #222;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .card {
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      padding: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 18px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 180px;
      flex: 1;
    }

    .field.small {
      max-width: 180px;
      flex: 0 0 180px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }

    input {
      width: 100%;
      height: 42px;
      padding: 10px 12px;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #1f5eff;
      box-shadow: 0 0 0 3px rgba(31, 94, 255, 0.12);
    }

    button {
      height: 42px;
      padding: 0 18px;
      border: none;
      border-radius: 10px;
      background: #1f5eff;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.93;
    }

    button.secondary {
      background: #6b7280;
    }

    .btn-area {
      display: flex;
      gap: 10px;
      align-items: end;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .msg {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .msg.error {
      color: #c62828;
    }

    .msg.success {
      color: #177245;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .info-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
    }

    .info-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 14px;
      font-weight: 600;
      word-break: break-word;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 14px;
    }

    table {
      width: 100%;
      min-width: 780px;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border: 1px solid #e5e7eb;
      padding: 10px 12px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #f3f6fb;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:nth-child(even) td {
      background: #fcfcfd;
    }

    .hidden {
      display: none;
    }

    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #eef4ff;
      color: #1f5eff;
    }

    .pill.univ {
      background: #e8f7ee;
      color: #177245;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    @media (max-width: 768px) {
      .wrap {
        padding: 16px 12px 28px;
      }

      h1 {
        font-size: 23px;
      }

      .info-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field,
      .field.small {
        min-width: 100%;
        max-width: 100%;
        flex: 1 1 100%;
      }

      button {
        width: 100%;
      }

      .btn-area {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- LOGIN -->
    <div class="card" id="loginCard">
      <h1>Hospital Search</h1>
      <div class="sub">비밀번호를 입력한 뒤 검색 화면으로 이동합니다.</div>

      <div class="row">
        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter password"
            onkeydown="if(event.key==='Enter') login();"
          />
        </div>
      </div>

      <div class="btn-area">
        <button onclick="login()">Enter</button>
      </div>

      <div id="loginMsg" class="msg"></div>
    </div>

    <!-- SEARCH -->
    <div class="card hidden" id="searchCard">
      <div class="top-bar">
        <div>
          <h1 style="margin-bottom:6px;">Hospital Search</h1>
          <div class="sub" style="margin-bottom:0;">
            ICAO 입력 후 반경 내 종합/대형병원 후보를 조회합니다.
          </div>
        </div>
        <div>
          <button class="secondary" onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="row" style="margin-top:16px;">
        <div class="field small">
          <label for="icao">ICAO CODE</label>
          <input
            type="text"
            id="icao"
            placeholder="ex) RKSS"
            maxlength="4"
            oninput="this.value = this.value.toUpperCase();"
            onkeydown="if(event.key==='Enter') searchHospitals();"
          />
        </div>

        <div class="field small">
          <label for="radius">Radius (km)</label>
          <input
            type="number"
            id="radius"
            placeholder="20"
            value="20"
            min="1"
            max="50"
            onkeydown="if(event.key==='Enter') searchHospitals();"
          />
        </div>
      </div>

      <div class="btn-area">
        <button onclick="searchHospitals()">Search</button>
      </div>

      <div id="searchMsg" class="msg"></div>

      <div class="info-grid" id="resultInfo" style="display:none;">
        <div class="info-box">
          <div class="info-label">ICAO</div>
          <div class="info-value" id="infoIcao">-</div>
        </div>
        <div class="info-box">
          <div class="info-label">LAT</div>
          <div class="info-value" id="infoLat">-</div>
        </div>
        <div class="info-box">
          <div class="info-label">LNG</div>
          <div class="info-value" id="infoLng">-</div>
        </div>
        <div class="info-box">
          <div class="info-label">CACHE</div>
          <div class="info-value" id="infoCache">-</div>
        </div>
      </div>

      <div class="table-wrap">
        <table id="resultTable">
          <thead>
            <tr>
              <th>DEST(lat,lng)</th>
              <th>NAME</th>
              <th>ADDRESS</th>
              <th>RATING</th>
              <th>RATINGS_TOTAL</th>
              <th>IS_UNIVERSITY</th>
            </tr>
          </thead>
          <tbody id="resultBody">
            <tr>
              <td colspan="6">No data</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    /********************************************************
     * 여기에 Apps Script 웹앱 URL 넣기
     ********************************************************/
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzi3x1B5nL9vgHaDNUYQ2NG-pNa9yg7gzW5EXDJufcjC62isk0imt92wPTXNdp9W3jY/exec';

    /********************************************************
     * 공통 fetch
     ********************************************************/
    async function postToServer(payload) {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();

      try {
        return JSON.parse(text);
      } catch (err) {
        throw new Error('응답 파싱 실패: ' + text);
      }
    }

    /********************************************************
     * 로그인
     ********************************************************/
    async function login() {
      const passwordInput = document.getElementById('password');
      const msg = document.getElementById('loginMsg');
      const password = passwordInput.value.trim();

      msg.className = 'msg';
      msg.textContent = '';

      if (!password) {
        msg.className = 'msg error';
        msg.textContent = '비밀번호를 입력해 주세요.';
        return;
      }

      try {
        msg.className = 'msg success';
        msg.textContent = '확인 중...';

        const data = await postToServer({
          action: 'login',
          password: password
        });

        if (!data.success) {
          msg.className = 'msg error';
          msg.textContent = data.message || '로그인 실패';
          return;
        }

        localStorage.setItem('hospital_password', password);
        showSearchView();

      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = '로그인 중 오류가 발생했습니다.';
      }
    }

    /********************************************************
     * 로그아웃
     ********************************************************/
    function logout() {
      localStorage.removeItem('hospital_password');
      document.getElementById('password').value = '';
      document.getElementById('icao').value = '';
      document.getElementById('radius').value = '20';
      document.getElementById('searchMsg').textContent = '';
      document.getElementById('loginMsg').textContent = '';
      document.getElementById('resultInfo').style.display = 'none';
      resetTable();
      showLoginView();
    }

    /********************************************************
     * 검색
     ********************************************************/
    async function searchHospitals() {
      const password = localStorage.getItem('hospital_password') || '';
      const icao = document.getElementById('icao').value.trim().toUpperCase();
      const radius = document.getElementById('radius').value.trim();
      const msg = document.getElementById('searchMsg');

      msg.className = 'msg';
      msg.textContent = '';

      if (!password) {
        msg.className = 'msg error';
        msg.textContent = '로그인이 필요합니다.';
        showLoginView();
        return;
      }

      if (!icao) {
        msg.className = 'msg error';
        msg.textContent = 'ICAO CODE를 입력해 주세요.';
        return;
      }

      resetTable();

      try {
        msg.className = 'msg success';
        msg.textContent = '조회 중...';

        const data = await postToServer({
          action: 'search',
          password: password,
          icao: icao,
          radius: radius
        });

        if (!data.success) {
          msg.className = 'msg error';
          msg.textContent = data.message || '조회 실패';
          return;
        }

        updateInfo(data);
        renderTable(data.results || []);

        const count = (data.results || []).length;
        const cachedText = data.cached ? ' / cache' : '';
        msg.className = 'msg success';
        msg.textContent = `${count}건 조회 완료${cachedText}`;

      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = '조회 중 오류가 발생했습니다.';
      }
    }

    /********************************************************
     * 결과 정보 표시
     ********************************************************/
    function updateInfo(data) {
      document.getElementById('resultInfo').style.display = 'grid';
      document.getElementById('infoIcao').textContent = data.icao || '-';
      document.getElementById('infoLat').textContent = data.lat ?? '-';
      document.getElementById('infoLng').textContent = data.lng ?? '-';
      document.getElementById('infoCache').textContent = data.cached ? 'YES' : 'NO';
    }

    /********************************************************
     * 테이블 렌더링
     ********************************************************/
    function renderTable(results) {
      const tbody = document.getElementById('resultBody');
      tbody.innerHTML = '';

      if (!results || results.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6">No results</td></tr>';
        return;
      }

      results.forEach(item => {
        const tr = document.createElement('tr');

        const univ = String(item.is_university || '').trim() === 'O'
          ? '<span class="pill univ">O</span>'
          : '';

        tr.innerHTML = `
          <td>${escapeHtml(item.dest || '')}</td>
          <td>${escapeHtml(item.name || '')}</td>
          <td>${escapeHtml(item.address || '')}</td>
          <td>${escapeHtml(String(item.rating || ''))}</td>
          <td>${escapeHtml(String(item.ratings_total || ''))}</td>
          <td>${univ}</td>
        `;

        tbody.appendChild(tr);
      });
    }

    /********************************************************
     * 초기화
     ********************************************************/
    function resetTable() {
      const tbody = document.getElementById('resultBody');
      tbody.innerHTML = '<tr><td colspan="6">No data</td></tr>';
    }

    function showLoginView() {
      document.getElementById('loginCard').classList.remove('hidden');
      document.getElementById('searchCard').classList.add('hidden');
    }

    function showSearchView() {
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('searchCard').classList.remove('hidden');
      document.getElementById('icao').focus();
    }

    /********************************************************
     * XSS 방지용 escape
     ********************************************************/
    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    /********************************************************
     * 페이지 로드 시 로그인 상태 확인
     ********************************************************/
    window.addEventListener('load', () => {
      const savedPassword = localStorage.getItem('hospital_password');
      if (savedPassword) {
        showSearchView();
      } else {
        showLoginView();
      }
    });
  </script>
</body>
</html>
