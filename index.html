<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Search Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #222;
    }

    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 20px 16px 36px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      padding: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 180px;
      flex: 1;
    }

    .field.small {
      max-width: 180px;
      flex: 0 0 180px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }

    input {
      width: 100%;
      height: 42px;
      padding: 10px 12px;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #1f5eff;
      box-shadow: 0 0 0 3px rgba(31,94,255,0.12);
    }

    button {
      height: 42px;
      padding: 0 18px;
      border: none;
      border-radius: 10px;
      background: #1f5eff;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { opacity: 0.93; }
    button.secondary { background: #6b7280; }

    .btn-area {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .msg {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .msg.error { color: #c62828; }
    .msg.success { color: #177245; }

    .hidden { display: none; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .info-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
    }

    .info-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 14px;
      font-weight: 600;
      word-break: break-word;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(680px, 1.15fr) minmax(520px, 0.85fr);
      gap: 16px;
      margin-top: 16px;
      align-items: start;
    }

    .left-col,
    .right-col {
      min-width: 0;
    }

    .right-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .table-wrap {
      overflow-y: auto;
      scroll-behavior: smooth;
      overflow-x: hidden;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      max-height: 720px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 10px;
      text-align: left;
      font-size: 13px;
      vertical-align: top;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    th {
      background: #f3f6fb;
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
    }

    #resultTable th:nth-child(1),
    #resultTable td:nth-child(1) { width: 40%; }

    #resultTable th:nth-child(2),
    #resultTable td:nth-child(2) { width: 16%; }

    #resultTable th:nth-child(3),
    #resultTable td:nth-child(3) { width: 12%; }

    #resultTable th:nth-child(4),
    #resultTable td:nth-child(4) { width: 15%; }

    #resultTable th:nth-child(5),
    #resultTable td:nth-child(5) {
      width: 8%;
      text-align: center;
    }

    #resultTable th:nth-child(6),
    #resultTable td:nth-child(6) {
      width: 9%;
      text-align: center;
    }

    tr.clickable-row { cursor: pointer; }
    tr.clickable-row:hover td { background: #f8fbff; }
    tr.active-row td { background: #eef4ff !important; }

    #map {
      width: 100%;
      height: 690px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      overflow: hidden;
      background: #fff;
    }

    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: #e8f7ee;
      color: #177245;
      white-space: nowrap;
    }

    .pill.top {
      background: #ecfccb;
      color: #3f6212;
    }

    .details-box,
    .capability-box {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      padding: 14px;
    }

    .details-box {
      margin-top: 14px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .details-line,
    .cap-line {
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .detail-link,
    .cap-link {
      color: #1f5eff;
      text-decoration: none;
      font-weight: 600;
    }

    .detail-link:hover,
    .cap-link:hover {
      text-decoration: underline;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .leaflet-popup-content {
      font-size: 13px;
      line-height: 1.5;
      max-width: 300px;
      word-break: break-word;
    }

    .marker-icon-wrap {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
      transition: all 0.15s ease;
    }

    .marker-default { background: #2563eb; }
    .marker-top { background: #a3e635; }

    .marker-selected {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ef4444;
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px rgba(239,68,68,0.35);
    }

    .airport-marker {
      font-size: 22px;
      line-height: 22px;
      text-align: center;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.35));
    }

    .mobile-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .mobile-meta-pill {
      display: inline-block;
      font-size: 12px;
      color: #4b5563;
      background: #f3f4f6;
      padding: 4px 8px;
      border-radius: 999px;
    }

    @media (max-width: 1180px) {
      .content-grid {
        grid-template-columns: 1fr;
      }

      #map {
        height: 520px;
      }
    }

    @media (max-width: 768px) {
      .wrap {
        padding: 10px 8px 18px;
      }

      .card {
        padding: 14px;
        border-radius: 12px;
      }

      h1 {
        font-size: 22px;
      }

      .sub {
        font-size: 13px;
        margin-bottom: 12px;
      }

      .field, .field.small {
        min-width: 100%;
        max-width: 100%;
        flex: 1 1 100%;
      }

      input,
      button {
        height: 40px;
        font-size: 14px;
      }

      button {
        width: 100%;
      }

      .info-grid {
        grid-template-columns: repeat(2, minmax(0,1fr));
        gap: 8px;
      }

      .info-box {
        padding: 10px;
      }

      .content-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
      }

      .right-col,
      .left-col {
        width: 100%;
        min-width: 0;
        flex: 0 0 100%;
      }

      .right-col {
        order: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .left-col {
        order: 2;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #map,
      .details-box,
      .capability-box,
      .table-wrap {
        width: 100%;
      }

      #map {
        height: 420px;
        border-radius: 12px;
      }

      .details-box,
      .capability-box {
        padding: 12px;
        margin-top: 0;
      }

      .section-title {
        font-size: 14px;
        margin-bottom: 8px;
      }

      .details-line,
      .cap-line {
        font-size: 13px;
        line-height: 1.6;
        margin-bottom: 4px;
      }

      .table-wrap {
        max-height: 420px;
        overflow-y: auto;
        overflow-x: hidden;
        border-radius: 12px;
      }

      #resultTable thead {
        display: none;
      }

      #resultTable,
      #resultTable tbody,
      #resultTable tr,
      #resultTable td {
        display: block;
        width: 100%;
      }

      #resultTable tr {
        position: relative;
        border-bottom: 1px solid #e5e7eb;
        padding: 10px 10px 8px;
        background: #fff;
        min-height: 96px;
      }

      #resultTable td {
        border: none;
        padding: 0;
        text-align: left !important;
        width: 100% !important;
      }

      #resultTable td:nth-child(1) {
        margin-bottom: 6px;
      }

      #resultTable td:nth-child(2) {
        position: absolute;
        right: 10px;
        top: 12px;
        width: auto !important;
        font-weight: 700;
        color: #111827;
      }

      #resultTable td:nth-child(3),
      #resultTable td:nth-child(4),
      #resultTable td:nth-child(5),
      #resultTable td:nth-child(6) {
        display: inline-block;
        width: auto !important;
        margin-right: 8px;
        margin-top: 6px;
        font-size: 12px;
        color: #4b5563;
        background: #f3f4f6;
        padding: 3px 7px;
        border-radius: 999px;
      }

      #resultTable tr.active-row {
        outline: 2px solid #dbeafe;
        outline-offset: -2px;
      }

      .pill,
      .pill.top {
        font-size: 10px;
        padding: 3px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="card" id="loginCard">
      <h1>Hospital Search</h1>
      <div class="sub">비밀번호 입력 후 공항 주변 병원을 조회합니다.</div>

      <div class="row">
        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter password"
          />
        </div>
      </div>

      <div class="btn-area">
        <button onclick="login()">Enter</button>
      </div>

      <div id="loginMsg" class="msg"></div>
    </div>

    <div class="card hidden" id="searchCard">
      <div class="top-bar">
        <div>
          <h1 style="margin-bottom:6px;">Hospital Search Map</h1>
          <div class="sub" style="margin-bottom:0;">
            ICAO 기준 반경 내 병원 리스트와 지도를 함께 표시합니다.
          </div>
        </div>
        <div>
          <button class="secondary" onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="row" style="margin-top:16px;">
        <div class="field small">
          <label for="icao">ICAO CODE</label>
          <input
            type="text"
            id="icao"
            placeholder="ex) RKSS"
            maxlength="4"
            oninput="this.value = this.value.toUpperCase();"
          />
        </div>

        <div class="field small">
          <label for="radius">Radius (km)</label>
          <input
            type="number"
            id="radius"
            placeholder="10"
            value="10"
            min="1"
            max="50"
          />
        </div>
      </div>

      <div class="btn-area">
        <button onclick="searchHospitals()">Search</button>
      </div>

      <div id="searchMsg" class="msg"></div>

      <div class="info-grid" id="resultInfo" style="display:none;">
        <div class="info-box">
          <div class="info-label">ICAO</div>
          <div class="info-value" id="infoIcao">-</div>
        </div>
        <div class="info-box">
          <div class="info-label">LAT</div>
          <div class="info-value" id="infoLat">-</div>
        </div>
        <div class="info-box">
          <div class="info-label">LNG</div>
          <div class="info-value" id="infoLng">-</div>
        </div>
        <div class="info-box">
          <div class="info-label">CACHE</div>
          <div class="info-value" id="infoCache">-</div>
        </div>
      </div>

      <div class="content-grid">
        <div class="left-col">
          <div class="table-wrap">
            <table id="resultTable">
              <thead>
                <tr>
                  <th>NAME</th>
                  <th>DISTANCE</th>
                  <th>RATING</th>
                  <th>RATINGS_TOTAL</th>
                  <th>UNIV</th>
                  <th>TOP</th>
                </tr>
              </thead>
              <tbody id="resultBody">
                <tr>
                  <td colspan="6">No data</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="details-box" id="detailsBox">
            <div class="section-title">Hospital Details</div>
            <div class="details-line">병원을 클릭하면 전체주소 / 전화번호 / 영업시간 / 홈페이지가 표시됩니다.</div>
          </div>
        </div>

        <div class="right-col">
          <div id="map"></div>

          <div class="capability-box" id="capabilityBox">
            <div class="section-title">Medical Capability</div>
            <div class="cap-line">병원을 클릭하면 홈페이지 / Google Maps 링크가 표시됩니다.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz4pwy-encrp7UT3dtB6zYnRE5oMYqRF7OqOY0x8dPwuRDGXRmgK_ElVBLfnjS1CYk/exec';

    let map;
    let airportMarker = null;
    let radiusCircle = null;
    let hospitalMarkers = [];
    let currentResults = [];
    let selectedHospitalIndex = -1;

    function initMap() {
      if (map) return;

      map = L.map('map').setView([37.5665, 126.9780], 10);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
    }

    function getAirportIcon() {
      return L.divIcon({
        className: '',
        html: `<div class="airport-marker">✈️</div>`,
        iconSize: [26, 26],
        iconAnchor: [13, 13],
        popupAnchor: [0, -10]
      });
    }

    function getHospitalIcon(isTop, isSelected) {
      let cls = 'marker-icon-wrap marker-default';
      if (isTop) cls = 'marker-icon-wrap marker-top';
      if (isSelected) cls = 'marker-selected';

      return L.divIcon({
        className: '',
        html: `<div class="${cls}"></div>`,
        iconSize: isSelected ? [28, 28] : [20, 20],
        iconAnchor: isSelected ? [14, 14] : [10, 10],
        popupAnchor: [0, -10]
      });
    }

    function calculateHospitalScore(item) {
      const rating = Number(item.rating || 0);
      const ratingsTotal = Number(item.ratings_total || 0);
      return rating * Math.log(ratingsTotal + 1);
    }

    function getTopHospitalIndexes(results) {
      if (!results || results.length === 0) return new Set();

      const scored = results.map((item, index) => ({
        index,
        score: calculateHospitalScore(item)
      }));

      scored.sort((a, b) => b.score - a.score);

      const topCount = Math.max(1, Math.ceil(results.length * 0.3));
      return new Set(scored.slice(0, topCount).map(x => x.index));
    }

    function isMobileView() {
      return window.innerWidth <= 768;
    }

    function applyMobileLayoutOrder() {
      const rightCol = document.querySelector('.right-col');
      const leftCol = document.querySelector('.left-col');
      const mapEl = document.getElementById('map');
      const capabilityBox = document.getElementById('capabilityBox');
      const detailsBox = document.getElementById('detailsBox');
      const tableWrap = document.querySelector('.table-wrap');

      if (!rightCol || !leftCol || !mapEl || !capabilityBox || !detailsBox || !tableWrap) return;

      if (window.innerWidth <= 768) {
        rightCol.appendChild(mapEl);
        rightCol.appendChild(detailsBox);
        rightCol.appendChild(capabilityBox);
        leftCol.appendChild(tableWrap);
      } else {
        leftCol.appendChild(tableWrap);
        leftCol.appendChild(detailsBox);
        rightCol.appendChild(mapEl);
        rightCol.appendChild(capabilityBox);
      }
    }

    async function postToServer(payload) {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();

      try {
        return JSON.parse(text);
      } catch (err) {
        throw new Error('응답 파싱 실패: ' + text);
      }
    }

    async function login() {
      const passwordInput = document.getElementById('password');
      const msg = document.getElementById('loginMsg');
      const password = passwordInput.value.trim();

      msg.className = 'msg';
      msg.textContent = '';

      if (!password) {
        msg.className = 'msg error';
        msg.textContent = '비밀번호를 입력해 주세요.';
        return;
      }

      try {
        msg.className = 'msg success';
        msg.textContent = '확인 중...';

        const data = await postToServer({
          action: 'login',
          password
        });

        if (!data.success) {
          msg.className = 'msg error';
          msg.textContent = data.message || '로그인 실패';
          return;
        }

        localStorage.setItem('hospital_password', password);
        showSearchView();

      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = '로그인 중 오류가 발생했습니다.';
      }
    }

    function logout() {
      localStorage.removeItem('hospital_password');
      document.getElementById('password').value = '';
      document.getElementById('icao').value = '';
      document.getElementById('radius').value = '10';
      document.getElementById('searchMsg').textContent = '';
      document.getElementById('loginMsg').textContent = '';
      document.getElementById('resultInfo').style.display = 'none';
      currentResults = [];
      selectedHospitalIndex = -1;
      resetTable();
      clearMapObjects();
      resetDetailsBox();
      resetCapabilityBox();
      showLoginView();
    }

    async function searchHospitals() {
      const password = localStorage.getItem('hospital_password') || '';
      const icao = document.getElementById('icao').value.trim().toUpperCase();
      const radius = document.getElementById('radius').value.trim();
      const msg = document.getElementById('searchMsg');

      msg.className = 'msg';
      msg.textContent = '';

      if (!password) {
        msg.className = 'msg error';
        msg.textContent = '로그인이 필요합니다.';
        showLoginView();
        return;
      }

      if (!icao) {
        msg.className = 'msg error';
        msg.textContent = 'ICAO CODE를 입력해 주세요.';
        return;
      }

      selectedHospitalIndex = -1;
      resetTable();
      clearMapObjects();
      resetDetailsBox();
      resetCapabilityBox();

      try {
        msg.className = 'msg success';
        msg.textContent = '조회 중...';

        const data = await postToServer({
          action: 'search',
          password,
          icao,
          radius
        });

        if (!data.success) {
          msg.className = 'msg error';
          msg.textContent = data.message || '조회 실패';
          return;
        }

        currentResults = data.results || [];

        updateInfo(data);
        renderTable(currentResults);
        renderMap(data);

        const count = currentResults.length;
        const cachedText = data.cached ? ' / cache' : '';
        msg.className = 'msg success';
        msg.textContent = `${count}건 조회 완료${cachedText}`;

      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = '조회 중 오류가 발생했습니다.';
      }
    }

    async function loadHospitalDetails(index, openPopupAfterLoad = true) {
      const item = currentResults[index];
      if (!item || !item.place_id) return;

      const password = localStorage.getItem('hospital_password') || '';
      const box = document.getElementById('detailsBox');
      const marker = hospitalMarkers[index];
      const isTop = getTopHospitalIndexes(currentResults).has(index);

      setSelectedHospital(index);

      if (item._detailsLoaded) {
        renderDetailsBox(item);
        renderCapabilityBox(item);

        if (marker && openPopupAfterLoad) {
          marker.setPopupContent(buildPopupHtml(item, isTop));
          marker.openPopup();
        }
        return;
      }

      box.innerHTML = `
        <div class="section-title">${escapeHtml(item.name || 'Hospital Details')}</div>
        <div class="details-line">상세정보 불러오는 중...</div>
      `;

      showCapabilityLoading(item.name || '');

      if (marker) {
        marker.setPopupContent(`
          <div>
            <div style="font-weight:700; margin-bottom:6px;">
              ${escapeHtml(item.name || '')}
              ${isTop ? '<span style="display:inline-block;margin-left:6px;padding:2px 6px;border-radius:999px;background:#ecfccb;color:#3f6212;font-size:11px;font-weight:700;">TOP</span>' : ''}
            </div>
            <div>상세정보 불러오는 중...</div>
          </div>
        `);

        if (openPopupAfterLoad) {
          marker.openPopup();
        }
      }

      try {
        const data = await postToServer({
          action: 'details',
          password,
          place_id: item.place_id
        });

        if (!data.success) {
          box.innerHTML = `
            <div class="section-title">${escapeHtml(item.name || 'Hospital Details')}</div>
            <div class="details-line">상세정보 조회 실패</div>
          `;
          renderCapabilityBox(item);

          if (marker) {
            marker.setPopupContent(`
              <div>
                <div style="font-weight:700; margin-bottom:6px;">${escapeHtml(item.name || '')}</div>
                <div>상세정보 조회 실패</div>
              </div>
            `);
          }
          return;
        }

        item.full_address = data.details.full_address || item.address || '';
        item.phone = data.details.phone || '';
        item.opening_hours = data.details.opening_hours || '';
        item.open_now = typeof data.details.open_now === 'boolean' ? data.details.open_now : null;
        item.google_maps_url = data.details.google_maps_url || '';
        item.website = data.details.website || '';
        item._detailsLoaded = true;

        renderDetailsBox(item);
        renderCapabilityBox(item);

        if (marker) {
          marker.setPopupContent(buildPopupHtml(item, isTop));

          if (openPopupAfterLoad) {
            marker.openPopup();
          }
        }

      } catch (err) {
        box.innerHTML = `
          <div class="section-title">${escapeHtml(item.name || 'Hospital Details')}</div>
          <div class="details-line">상세정보 조회 중 오류 발생</div>
        `;
        renderCapabilityBox(item);

        if (marker) {
          marker.setPopupContent(`
            <div>
              <div style="font-weight:700; margin-bottom:6px;">${escapeHtml(item.name || '')}</div>
              <div>상세정보 조회 중 오류 발생</div>
            </div>
          `);
        }
      }
    }

    function getOpenNowText(value) {
      if (value === true) return '영업중';
      if (value === false) return '영업 종료';
      return '정보 없음';
    }

    function renderDetailsBox(item) {
      const box = document.getElementById('detailsBox');

      const rating = item.rating || '-';
      const reviews = item.ratings_total || '-';
      const univ = String(item.is_university || '').trim() === 'O' ? 'O' : '-';
      const itemIndex = currentResults.findIndex(x => x.place_id === item.place_id);
      const topIndexes = getTopHospitalIndexes(currentResults);
      const topText = topIndexes.has(itemIndex) ? 'TOP' : '-';

      box.innerHTML = `
        <div class="section-title">${escapeHtml(item.name || 'Hospital Details')}</div>

        <div class="mobile-meta-row">
          <span class="mobile-meta-pill">Distance ${escapeHtml(String(item.distance_km || '-'))} km</span>
          <span class="mobile-meta-pill">Rating ${escapeHtml(String(rating))}</span>
          <span class="mobile-meta-pill">Reviews ${escapeHtml(String(reviews))}</span>
          <span class="mobile-meta-pill">Univ ${escapeHtml(univ)}</span>
          <span class="mobile-meta-pill">Top ${escapeHtml(topText)}</span>
        </div>

        <div class="details-line" style="margin-top:10px;"><b>전체 주소:</b> ${escapeHtml(item.full_address || item.address || '정보 없음')}</div>
        <div class="details-line"><b>전화번호:</b> ${escapeHtml(item.phone || '정보 없음')}</div>
        <div class="details-line"><b>영업시간:</b> ${escapeHtml(item.opening_hours || '정보 없음')}</div>
        <div class="details-line">
          <b>홈페이지:</b>
          ${item.website
            ? `<a class="detail-link" href="${escapeHtml(item.website)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.website)}</a>`
            : '정보 없음'}
        </div>
      `;
    }

    function resetDetailsBox() {
      const box = document.getElementById('detailsBox');
      box.innerHTML = `
        <div class="section-title">Hospital Details</div>
        <div class="details-line">병원을 클릭하면 전체주소 / 전화번호 / 영업시간 / 홈페이지가 표시됩니다.</div>
      `;
    }

    function resetCapabilityBox() {
      const box = document.getElementById('capabilityBox');
      box.innerHTML = `
        <div class="section-title">Medical Capability</div>
        <div class="cap-line">병원을 클릭하면 홈페이지 / Google Maps 링크가 표시됩니다.</div>
      `;
    }

    function showCapabilityLoading(name) {
      const box = document.getElementById('capabilityBox');
      box.innerHTML = `
        <div class="section-title">Medical Capability</div>
        <div class="cap-line"><b>${escapeHtml(name || '')}</b></div>
        <div class="cap-line">불러오는 중...</div>
      `;
    }

    function renderCapabilityBox(item) {
      const box = document.getElementById('capabilityBox');
      const website = item.website || '';

      box.innerHTML = `
        <div class="section-title">Medical Capability</div>
        <div class="cap-line"><b>${escapeHtml(item.name || '')}</b></div>
        <div class="cap-line">
          <b>홈페이지:</b>
          ${website
            ? `<a class="cap-link" href="${escapeHtml(website)}" target="_blank" rel="noopener noreferrer">병원 홈페이지 열기</a>`
            : '정보 없음'}
        </div>
        <div class="cap-line">
          <b>Google Maps:</b>
          ${item.google_maps_url
            ? `<a class="cap-link" href="${escapeHtml(item.google_maps_url)}" target="_blank" rel="noopener noreferrer">구글맵에서 열기</a>`
            : '정보 없음'}
        </div>
      `;
    }

    function updateInfo(data) {
      document.getElementById('resultInfo').style.display = 'grid';
      document.getElementById('infoIcao').textContent = data.icao || '-';
      document.getElementById('infoLat').textContent = data.lat ?? '-';
      document.getElementById('infoLng').textContent = data.lng ?? '-';
      document.getElementById('infoCache').textContent = data.cached ? 'YES' : 'NO';
    }

    function renderTable(results) {
      const tbody = document.getElementById('resultBody');
      tbody.innerHTML = '';

      if (!results || results.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6">No results</td></tr>';
        return;
      }

      const topIndexes = getTopHospitalIndexes(results);

      results.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.className = 'clickable-row';

        const univText = String(item.is_university || '').trim() === 'O' ? 'O' : '-';

        tr.innerHTML = `
          <td>
            <div style="font-weight:700; margin-bottom:4px; padding-right:72px;">${escapeHtml(item.name || '')}</div>
            <div style="font-size:12px; color:#666;">${escapeHtml(item.address || '')}</div>
          </td>
          <td>${escapeHtml(String(item.distance_km || ''))} km</td>
          <td>Rating ${escapeHtml(String(item.rating || ''))}</td>
          <td>Reviews ${escapeHtml(String(item.ratings_total || ''))}</td>
          <td>Univ ${univText}</td>
          <td>${topIndexes.has(index) ? 'Top TOP' : 'Top -'}</td>
        `;

        tr.addEventListener('click', async () => {
          await focusHospital(index);
        });

        tbody.appendChild(tr);
      });
    }

    function scrollToHospitalRow(index) {
      const tbody = document.getElementById('resultBody');
      const rows = tbody.querySelectorAll('tr.clickable-row');
      const row = rows[index];
      const wrap = document.querySelector('.table-wrap');
      if (!row || !wrap) return;

      const wrapRect = wrap.getBoundingClientRect();
      const rowRect = row.getBoundingClientRect();
      const targetTop = wrap.scrollTop + (rowRect.top - wrapRect.top) - (wrap.clientHeight / 2) + (row.clientHeight / 2);

      wrap.scrollTo({
        top: Math.max(0, targetTop),
        behavior: 'smooth'
      });
    }

    function buildPopupHtml(item, isTop) {
      return `
        <div>
          <div style="font-weight:700; margin-bottom:6px;">
            ${escapeHtml(item.name || '')}
            ${isTop ? '<span style="display:inline-block;margin-left:6px;padding:2px 6px;border-radius:999px;background:#ecfccb;color:#3f6212;font-size:11px;font-weight:700;">TOP</span>' : ''}
          </div>
          <div><b>Distance:</b> ${escapeHtml(String(item.distance_km || ''))} km</div>
          <div><b>Rating:</b> ${escapeHtml(String(item.rating || ''))}</div>
          <div><b>Ratings Total:</b> ${escapeHtml(String(item.ratings_total || ''))}</div>
          <div style="margin-top:4px;"><b>Address:</b> ${escapeHtml(item.full_address || item.address || '')}</div>
          <div><b>Phone:</b> ${escapeHtml(item.phone || '정보 없음')}</div>
          <div><b>Open Now:</b> ${escapeHtml(getOpenNowText(item.open_now))}</div>
          <div><b>Hours:</b> ${escapeHtml(item.opening_hours || '정보 없음')}</div>
          <div>
            <b>Website:</b>
            ${item.website
              ? `<a class="cap-link" href="${escapeHtml(item.website)}" target="_blank" rel="noopener noreferrer">Open</a>`
              : '정보 없음'}
          </div>
        </div>
      `;
    }

    function renderMap(data) {
      initMap();
      applyMobileLayoutOrder();

      const centerLat = Number(data.lat);
      const centerLng = Number(data.lng);
      const radiusKm = Number(data.radius || 10);
      const results = data.results || [];
      const topIndexes = getTopHospitalIndexes(results);

      airportMarker = L.marker([centerLat, centerLng], {
        icon: getAirportIcon()
      }).addTo(map).bindPopup(`<b>${escapeHtml(data.icao || 'AIRPORT')}</b><br>Airport Center`);

      radiusCircle = L.circle([centerLat, centerLng], {
        radius: radiusKm * 1000
      }).addTo(map);

      const bounds = L.latLngBounds([[centerLat, centerLng]]);

      results.forEach((item, index) => {
        const lat = Number(item.lat);
        const lng = Number(item.lng);
        if (!isFinite(lat) || !isFinite(lng)) return;

        const isTop = topIndexes.has(index);

        const marker = L.marker([lat, lng], {
          icon: getHospitalIcon(isTop, index === selectedHospitalIndex)
        }).addTo(map);

        marker.on('click', async () => {
          await focusHospital(index);
        });

        hospitalMarkers.push(marker);
        bounds.extend([lat, lng]);
      });

      map.fitBounds(bounds, { padding: [30, 30] });

      setTimeout(() => {
        map.invalidateSize();
      }, 250);
    }

    function setSelectedHospital(index) {
      selectedHospitalIndex = index;
      scrollToHospitalRow(index);
      refreshHospitalMarkerIcons();
      highlightRow(index, true);
    }

    function refreshHospitalMarkerIcons() {
      const topIndexes = getTopHospitalIndexes(currentResults);

      hospitalMarkers.forEach((marker, index) => {
        const isTop = topIndexes.has(index);
        const isSelected = index === selectedHospitalIndex;
        marker.setIcon(getHospitalIcon(isTop, isSelected));
      });
    }

    async function focusHospital(index) {
      if (!hospitalMarkers[index]) return;

      setSelectedHospital(index);

      const marker = hospitalMarkers[index];
      const latlng = marker.getLatLng();

      map.setView(latlng, Math.max(map.getZoom(), 13), { animate: true });
      await loadHospitalDetails(index, true);
    }

    function highlightRow(index, scrollToCenter = false) {
      const rows = document.querySelectorAll('#resultBody tr');
      const tableWrap = document.querySelector('.table-wrap');

      rows.forEach((row, i) => {
        if (i === index) row.classList.add('active-row');
        else row.classList.remove('active-row');
      });

      if (!scrollToCenter || !rows[index] || !tableWrap) return;

      const row = rows[index];
      const wrapRect = tableWrap.getBoundingClientRect();
      const rowRect = row.getBoundingClientRect();
      const currentScroll = tableWrap.scrollTop;
      const offset = (rowRect.top - wrapRect.top) - (tableWrap.clientHeight / 2) + (rowRect.height / 2);

      tableWrap.scrollTo({
        top: Math.max(0, currentScroll + offset),
        behavior: 'smooth'
      });
    }

    function clearMapObjects() {
      if (!map) return;

      if (airportMarker) {
        map.removeLayer(airportMarker);
        airportMarker = null;
      }

      if (radiusCircle) {
        map.removeLayer(radiusCircle);
        radiusCircle = null;
      }

      hospitalMarkers.forEach(marker => map.removeLayer(marker));
      hospitalMarkers = [];
      selectedHospitalIndex = -1;
    }

    function resetTable() {
      const tbody = document.getElementById('resultBody');
      tbody.innerHTML = '<tr><td colspan="6">No data</td></tr>';
    }

    function showLoginView() {
      document.getElementById('loginCard').classList.remove('hidden');
      document.getElementById('searchCard').classList.add('hidden');
    }

    function showSearchView() {
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('searchCard').classList.remove('hidden');
      applyMobileLayoutOrder();
      initMap();

      setTimeout(() => {
        map.invalidateSize();
      }, 250);

      document.getElementById('icao').focus();
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    document.addEventListener('DOMContentLoaded', () => {
      const passwordEl = document.getElementById('password');
      const icaoEl = document.getElementById('icao');
      const radiusEl = document.getElementById('radius');

      if (passwordEl) {
        passwordEl.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            login();
          }
        });
      }

      if (icaoEl) {
        icaoEl.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            searchHospitals();
          }
        });
      }

      if (radiusEl) {
        radiusEl.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            searchHospitals();
          }
        });
      }
    });

    window.addEventListener('resize', () => {
      applyMobileLayoutOrder();
      if (map) {
        setTimeout(() => map.invalidateSize(), 150);
      }
    });

    window.addEventListener('load', () => {
      const savedPassword = localStorage.getItem('hospital_password');
      if (savedPassword) showSearchView();
      else showLoginView();
    });
  </script>
</body>
</html>
