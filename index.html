<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Hospital Search Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #222;
      position: relative;
    }

    .wrap {
      width: 100%;
      max-width: 1500px;
      margin: 0 auto;
      padding: 20px 16px 36px;
      overflow-x: hidden;
    }

    .card {
      width: 100%;
      max-width: 100%;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      padding: 20px;
      margin-bottom: 18px;
      overflow-x: hidden;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
      width: 100%;
      max-width: 100%;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 180px;
      flex: 1;
    }

    .field.small {
      max-width: 180px;
      flex: 0 0 180px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }

    input {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      height: 42px;
      padding: 10px 12px;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #1f5eff;
      box-shadow: 0 0 0 3px rgba(31, 94, 255, 0.12);
    }

    button {
      height: 42px;
      padding: 0 18px;
      border: none;
      border-radius: 10px;
      background: #1f5eff;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.93;
    }

    button.secondary {
      background: #6b7280;
    }

    .btn-area {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
      width: 100%;
    }

    .msg {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .msg.error {
      color: #c62828;
    }

    .msg.success {
      color: #177245;
    }

    .hidden {
      display: none;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .info-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
    }

    .info-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 14px;
      font-weight: 600;
      word-break: break-word;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(680px, 1.15fr) minmax(520px, 0.85fr);
      gap: 16px;
      margin-top: 16px;
      align-items: start;
      width: 100%;
      max-width: 100%;
    }

    .left-col,
    .right-col {
      min-width: 0;
      width: 100%;
      max-width: 100%;
    }

    .right-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .table-wrap {
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      max-height: 720px;
      background: #fff;
      width: 100%;
      max-width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 10px;
      text-align: left;
      font-size: 13px;
      vertical-align: top;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    th {
      background: #f3f6fb;
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
    }

    #resultTable th:nth-child(1),
    #resultTable td:nth-child(1) {
      width: 40%;
    }

    #resultTable th:nth-child(2),
    #resultTable td:nth-child(2) {
      width: 16%;
    }

    #resultTable th:nth-child(3),
    #resultTable td:nth-child(3) {
      width: 12%;
    }

    #resultTable th:nth-child(4),
    #resultTable td:nth-child(4) {
      width: 15%;
    }

    #resultTable th:nth-child(5),
    #resultTable td:nth-child(5) {
      width: 8%;
      text-align: center;
    }

    #resultTable th:nth-child(6),
    #resultTable td:nth-child(6) {
      width: 9%;
      text-align: center;
    }

    tr.clickable-row {
      cursor: pointer;
    }

    tr.clickable-row:hover td {
      background: #f8fbff;
    }

    tr.active-row td {
      background: #eef4ff !important;
    }

    #map {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      height: 690px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      overflow: hidden;
      background: #fff;
    }

    .details-box {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      padding: 14px;
      width: 100%;
      max-width: 100%;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .details-line {
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .detail-link {
      color: #1f5eff;
      text-decoration: none;
      font-weight: 600;
    }

    .detail-link:hover {
      text-decoration: underline;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      width: 100%;
      max-width: 100%;
    }

    .leaflet-container {
      width: 100%;
      max-width: 100%;
    }

    .leaflet-popup-content {
      font-size: 13px;
      line-height: 1.5;
      max-width: 300px;
      word-break: break-word;
    }

    .marker-icon-wrap {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2);
      transition: all 0.15s ease;
    }

    .marker-default {
      background: #2563eb;
    }

    .marker-top {
      background: #a3e635;
    }

    .marker-selected {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ef4444;
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.35);
    }

    .airport-marker {
      font-size: 22px;
      line-height: 22px;
      text-align: center;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.35));
    }

    .meta-chip {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      color: #4b5563;
      background: #f3f4f6;
      white-space: nowrap;
    }

    .mini-tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
    }

    .mini-tag-univ {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .mini-tag-top {
      background: #ecfccb;
      color: #3f6212;
    }

    .plain-dash {
      color: #6b7280;
      font-weight: 600;
    }

    @media (max-width: 1180px) {
      .content-grid {
        grid-template-columns: 1fr;
      }

      #map {
        height: 520px;
      }
    }

    @media (max-width: 768px) {
      html,
      body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }

      .wrap {
        width: 100%;
        max-width: 100%;
        padding: 10px 8px 18px;
        overflow-x: hidden;
      }

      .card {
        width: 100%;
        max-width: 100%;
        padding: 14px 12px;
        border-radius: 12px;
        overflow-x: hidden;
      }

      h1 {
        font-size: 22px;
      }

      .sub {
        font-size: 13px;
        margin-bottom: 12px;
      }

      .top-bar {
        display: block;
        width: 100%;
      }

      .top-bar > div {
        width: 100%;
        max-width: 100%;
      }

.top-bar .secondary {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 122px;
  height: 42px;
  margin-top: 8px;
  padding: 0;
  line-height: 1;
  text-align: center;
  appearance: none;
  -webkit-appearance: none;
}
      .search-row-mobile {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 10px;
        align-items: end;
        width: 100%;
      }

      .field,
      .field.small,
      .search-row-mobile .field,
      .search-row-mobile .field.small,
      input,
      .content-grid,
      .left-col,
      .right-col,
      .table-wrap,
      #map,
      .details-box {
        min-width: 0;
        max-width: 100%;
      }

      .field,
      .field.small {
        flex: 1 1 100%;
      }

      input,
      button {
        height: 40px;
        font-size: 14px;
      }

      .btn-area {
        width: 100%;
        margin-top: 10px;
      }

      .btn-area button {
        width: 120px;
        max-width: 100%;
        margin: 0;
      }

      .info-grid {
        display: none;
      }

      .content-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
      }

      .right-col {
        order: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .left-col {
        order: 2;
        width: 100%;
        flex: 0 0 100%;
      }

      #map {
        width: 100%;
        height: 420px;
        border-radius: 12px;
      }

      .details-box {
        width: 100%;
        margin-top: 0;
        padding: 12px;
      }

      .section-title {
        font-size: 14px;
        margin-bottom: 8px;
      }

      .details-line {
        font-size: 13px;
        line-height: 1.55;
        margin-bottom: 4px;
      }

      .table-wrap {
        width: 100%;
        max-height: none;
        overflow-y: visible;
        overflow-x: hidden;
        border-radius: 12px;
      }

      #resultTable thead {
        display: none;
      }

      #resultTable,
      #resultTable tbody,
      #resultTable tr,
      #resultTable td {
        display: block;
        width: 100%;
      }

      #resultTable tr {
        position: relative;
        border-bottom: 1px solid #e5e7eb;
        padding: 9px 8px 7px;
        background: #fff;
        min-height: 92px;
      }

      #resultTable td {
        border: none;
        padding: 0;
        text-align: left !important;
        width: 100% !important;
      }

      #resultTable td:nth-child(1) {
        margin-bottom: 4px;
      }

      #resultTable td:nth-child(2) {
        position: absolute;
        right: 8px;
        top: 10px;
        width: auto !important;
        font-weight: 700;
        color: #111827;
        font-size: 12px;
      }

      #resultTable td:nth-child(3),
      #resultTable td:nth-child(4),
      #resultTable td:nth-child(5),
      #resultTable td:nth-child(6) {
        display: inline-block;
        width: auto !important;
        margin-right: 6px;
        margin-top: 5px;
        font-size: 11px;
        background: transparent;
        padding: 0;
        border-radius: 0;
        vertical-align: middle;
      }

      .meta-chip {
        padding: 2px 7px;
        font-size: 11px;
      }

      .mini-tag {
        padding: 2px 7px;
        font-size: 10px;
      }

      .plain-dash {
        font-size: 12px;
      }

      #resultTable tr.active-row {
        outline: 2px solid #dbeafe;
        outline-offset: -2px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="loginCard">
      <h1>Hospital Search</h1>
      <div class="sub">비밀번호 입력 후 공항 주변 병원을 조회합니다.</div>

      <div class="row">
        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter password"
          />
        </div>
      </div>

      <div class="btn-area">
        <button onclick="login()">Enter</button>
      </div>

      <div id="loginMsg" class="msg"></div>
    </div>

    <div class="card hidden" id="searchCard">
      <div class="top-bar">
        <div>
          <h1 style="margin-bottom:6px;">Hospital Search Map</h1>
          <div class="sub" style="margin-bottom:0;">
            ICAO 기준 반경 내 병원 리스트와 지도를 함께 표시합니다.
          </div>
        </div>
        <div>
          <button class="secondary" onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="row search-row-mobile" style="margin-top:16px;">
        <div class="field small">
          <label for="icao">ICAO CODE</label>
          <input
            type="text"
            id="icao"
            placeholder="ex) RKSS"
            maxlength="4"
            oninput="this.value = this.value.toUpperCase();"
          />
        </div>

        <div class="field small">
          <label for="radius">Radius (km)</label>
          <input
            type="number"
            id="radius"
            placeholder="20"
            value="20"
            min="1"
            max="50"
          />
        </div>
      </div>

      <div class="btn-area">
        <button onclick="searchHospitals()">Search</button>
      </div>

      <div id="searchMsg" class="msg"></div>

      <div class="info-grid" id="resultInfo" style="display:none;">
        <div class="info-box">
          <div class="info-label">ICAO</div>
          <div class="info-value" id="infoIcao">-</div>
        </div>
        <div class="info-box">
          <div class="info-label">LAT</div>
          <div class="info-value" id="infoLat">-</div>
        </div>
        <div class="info-box">
          <div class="info-label">LNG</div>
          <div class="info-value" id="infoLng">-</div>
        </div>
        <div class="info-box">
          <div class="info-label">CACHE</div>
          <div class="info-value" id="infoCache">-</div>
        </div>
      </div>

      <div class="content-grid">
        <div class="left-col">
          <div class="table-wrap">
            <table id="resultTable">
              <thead>
                <tr>
                  <th>NAME</th>
                  <th>DISTANCE</th>
                  <th>RATING</th>
                  <th>RATINGS_TOTAL</th>
                  <th>UNIV</th>
                  <th>TOP</th>
                </tr>
              </thead>
              <tbody id="resultBody">
                <tr>
                  <td colspan="6">No data</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="right-col">
          <div id="map"></div>

          <div class="details-box" id="detailsBox">
            <div class="section-title">Hospital Details</div>
            <div class="details-line">
              병원을 클릭하면 전체주소 / 전화번호 / 운영시간 / 홈페이지 / Google Maps 링크가 표시됩니다.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqYVhLFQu7eLqEkm2A1pyoCKmG7GnhQxSi3_4TnoPMx-NtHTgbOLhMsDbQTE4j4uZ5/exec';

    let map;
    let airportMarker = null;
    let radiusCircle = null;
    let hospitalMarkers = [];
    let currentResults = [];
    let selectedHospitalIndex = -1;

    function initMap() {
      if (map) return;

      map = L.map('map', {
        zoomControl: true
      }).setView([37.5665, 126.9780], 10);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
    }

    function getAirportIcon() {
      return L.divIcon({
        className: '',
        html: `<div class="airport-marker">✈️</div>`,
        iconSize: [26, 26],
        iconAnchor: [13, 13],
        popupAnchor: [0, -10]
      });
    }

    function getHospitalIcon(isTop, isSelected) {
      let cls = 'marker-icon-wrap marker-default';
      if (isTop) cls = 'marker-icon-wrap marker-top';
      if (isSelected) cls = 'marker-selected';

      return L.divIcon({
        className: '',
        html: `<div class="${cls}"></div>`,
        iconSize: isSelected ? [28, 28] : [20, 20],
        iconAnchor: isSelected ? [14, 14] : [10, 10],
        popupAnchor: [0, -10]
      });
    }

    function calculateHospitalScore(item) {
      const rating = Number(item.rating || 0);
      const ratingsTotal = Number(item.ratings_total || 0);
      return rating * Math.log(ratingsTotal + 1);
    }

    function getTopHospitalIndexes(results) {
      if (!results || results.length === 0) return new Set();

      const scored = results.map((item, index) => ({
        index,
        score: calculateHospitalScore(item)
      }));

      scored.sort((a, b) => b.score - a.score);

      const topCount = Math.max(1, Math.ceil(results.length * 0.3));
      return new Set(scored.slice(0, topCount).map(x => x.index));
    }

    async function postToServer(payload) {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();

      try {
        return JSON.parse(text);
      } catch (err) {
        throw new Error('응답 파싱 실패: ' + text);
      }
    }

    async function login() {
      const passwordInput = document.getElementById('password');
      const msg = document.getElementById('loginMsg');
      const password = passwordInput.value.trim();

      msg.className = 'msg';
      msg.textContent = '';

      if (!password) {
        msg.className = 'msg error';
        msg.textContent = '비밀번호를 입력해 주세요.';
        return;
      }

      try {
        msg.className = 'msg success';
        msg.textContent = '확인 중...';

        const data = await postToServer({
          action: 'login',
          password
        });

        if (!data.success) {
          msg.className = 'msg error';
          msg.textContent = data.message || '로그인 실패';
          return;
        }

        localStorage.setItem('hospital_password', password);
        showSearchView();
      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = '로그인 중 오류가 발생했습니다.';
      }
    }

    function logout() {
      localStorage.removeItem('hospital_password');
      document.getElementById('password').value = '';
      document.getElementById('icao').value = '';
      document.getElementById('radius').value = '10';
      document.getElementById('searchMsg').textContent = '';
      document.getElementById('loginMsg').textContent = '';
      document.getElementById('resultInfo').style.display = 'none';
      currentResults = [];
      selectedHospitalIndex = -1;
      resetTable();
      clearMapObjects();
      resetDetailsBox();
      showLoginView();
    }

  async function searchHospitals(retryCount = 0) {
  const password = localStorage.getItem('hospital_password') || '';
  const icao = document.getElementById('icao').value.trim().toUpperCase();
  const radius = document.getElementById('radius').value.trim();
  const msg = document.getElementById('searchMsg');

  msg.className = 'msg';
  msg.textContent = '';

  if (!password) {
    msg.className = 'msg error';
    msg.textContent = '로그인이 필요합니다.';
    showLoginView();
    return;
  }

  if (!icao) {
    msg.className = 'msg error';
    msg.textContent = 'ICAO CODE를 입력해 주세요.';
    return;
  }

  selectedHospitalIndex = -1;
  resetTable();
  clearMapObjects();
  resetDetailsBox();

  try {
    msg.className = 'msg success';
    msg.textContent = '조회 중...';

    const data = await postToServer({
      action: 'search',
      password,
      icao,
      radius
    });

    if (data.busy) {
      msg.className = 'msg success';
      msg.textContent = '다른 사용자가 조회 중입니다. 잠시 후 자동으로 다시 시도합니다...';

      if (retryCount < 10) {
        setTimeout(() => {
          searchHospitals(retryCount + 1);
        }, 2500);
        return;
      }

      msg.className = 'msg error';
      msg.textContent = '다른 사용자가 계속 조회 중입니다. 잠시 후 다시 시도해 주세요.';
      return;
    }

    if (!data.success) {
      msg.className = 'msg error';
      msg.textContent = data.message || '조회 실패';
      return;
    }

    currentResults = data.results || [];

    updateInfo(data);
    renderTable(currentResults);
    renderMap(data);

    const count = currentResults.length;
    const cachedText = data.cached ? ' / cache' : '';
    msg.className = 'msg success';
    msg.textContent = `${count}건 조회 완료${cachedText}`;
  } catch (err) {
    msg.className = 'msg error';
    msg.textContent = '조회 중 오류가 발생했습니다.';
  }
}

    async function loadHospitalDetails(index, openPopupAfterLoad = true) {
      const item = currentResults[index];
      if (!item || !item.place_id) return;

      const password = localStorage.getItem('hospital_password') || '';
      const box = document.getElementById('detailsBox');
      const marker = hospitalMarkers[index];
      const isTop = getTopHospitalIndexes(currentResults).has(index);

      setSelectedHospital(index);

      if (item._detailsLoaded) {
        renderDetailsBox(item);

        if (marker && openPopupAfterLoad) {
          marker.setPopupContent(buildPopupHtml(item, isTop));
          marker.openPopup();
        }
        return;
      }

      box.innerHTML = `
        <div class="section-title">${escapeHtml(item.name || 'Hospital Details')}</div>
        <div class="details-line">상세정보 불러오는 중...</div>
      `;

      if (marker) {
        marker.setPopupContent(`
          <div>
            <div style="font-weight:700; margin-bottom:6px;">
              ${escapeHtml(item.name || '')}
              ${isTop ? '<span style="display:inline-block;margin-left:6px;padding:2px 6px;border-radius:999px;background:#ecfccb;color:#3f6212;font-size:11px;font-weight:700;">TOP</span>' : ''}
            </div>
            <div>상세정보 불러오는 중...</div>
          </div>
        `);

        if (openPopupAfterLoad) {
          marker.openPopup();
        }
      }

      try {
        const data = await postToServer({
          action: 'details',
          password,
          place_id: item.place_id
        });

        if (!data.success) {
          box.innerHTML = `
            <div class="section-title">${escapeHtml(item.name || 'Hospital Details')}</div>
            <div class="details-line">상세정보 조회 실패</div>
          `;

          if (marker) {
            marker.setPopupContent(`
              <div>
                <div style="font-weight:700; margin-bottom:6px;">${escapeHtml(item.name || '')}</div>
                <div>상세정보 조회 실패</div>
              </div>
            `);
          }
          return;
        }

        item.full_address = data.details.full_address || item.address || '';
        item.phone = data.details.phone || '';
        item.opening_hours = data.details.opening_hours || '';
        item.google_maps_url = data.details.google_maps_url || '';
        item.website = data.details.website || '';
        item._detailsLoaded = true;

        renderDetailsBox(item);

        if (marker) {
          marker.setPopupContent(buildPopupHtml(item, isTop));

          if (openPopupAfterLoad) {
            marker.openPopup();
          }
        }
      } catch (err) {
        box.innerHTML = `
          <div class="section-title">${escapeHtml(item.name || 'Hospital Details')}</div>
          <div class="details-line">상세정보 조회 중 오류 발생</div>
        `;

        if (marker) {
          marker.setPopupContent(`
            <div>
              <div style="font-weight:700; margin-bottom:6px;">${escapeHtml(item.name || '')}</div>
              <div>상세정보 조회 중 오류 발생</div>
            </div>
          `);
        }
      }
    }

    function renderDetailsBox(item) {
      const box = document.getElementById('detailsBox');
      box.innerHTML = `
        <div class="section-title">${escapeHtml(item.name || 'Hospital Details')}</div>
        <div class="details-line"><b>전체 주소:</b> ${escapeHtml(item.full_address || item.address || '정보 없음')}</div>
        <div class="details-line"><b>전화번호:</b> ${escapeHtml(item.phone || '정보 없음')}</div>
        <div class="details-line"><b>운영시간:</b> ${escapeHtml(item.opening_hours || '정보 없음')}</div>
        <div class="details-line">
          <b>홈페이지:</b>
          ${item.website
            ? `<a class="detail-link" href="${escapeHtml(item.website)}" target="_blank" rel="noopener noreferrer">병원 홈페이지 열기</a>`
            : '정보 없음'}
        </div>
        <div class="details-line">
          <b>Google Maps:</b>
          ${item.google_maps_url
            ? `<a class="detail-link" href="${escapeHtml(item.google_maps_url)}" target="_blank" rel="noopener noreferrer">구글맵에서 열기</a>`
            : '정보 없음'}
        </div>
      `;
    }

    function resetDetailsBox() {
      const box = document.getElementById('detailsBox');
      box.innerHTML = `
        <div class="section-title">Hospital Details</div>
        <div class="details-line">
          병원을 클릭하면 전체주소 / 전화번호 / 운영시간 / 홈페이지 / Google Maps 링크가 표시됩니다.
        </div>
      `;
    }

    function updateInfo(data) {
      document.getElementById('resultInfo').style.display = 'grid';
      document.getElementById('infoIcao').textContent = data.icao || '-';
      document.getElementById('infoLat').textContent = data.lat ?? '-';
      document.getElementById('infoLng').textContent = data.lng ?? '-';
      document.getElementById('infoCache').textContent = data.cached ? 'YES' : 'NO';
    }

    function renderTable(results) {
      const tbody = document.getElementById('resultBody');
      tbody.innerHTML = '';

      if (!results || results.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6">No results</td></tr>';
        return;
      }

      const topIndexes = getTopHospitalIndexes(results);

      results.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.className = 'clickable-row';

        const isUniv = String(item.is_university || '').trim() === 'O';
        const isTop = topIndexes.has(index);

        tr.innerHTML = `
          <td>
            <div style="font-weight:700; margin-bottom:4px; padding-right:64px;">${escapeHtml(item.name || '')}</div>
            <div style="font-size:12px; color:#666;">${escapeHtml(item.address || '')}</div>
          </td>
          <td>${escapeHtml(String(item.distance_km || ''))} km</td>
          <td><span class="meta-chip">Rating ${escapeHtml(String(item.rating || ''))}</span></td>
          <td><span class="meta-chip">Reviews ${escapeHtml(String(item.ratings_total || ''))}</span></td>
          <td>${isUniv ? '<span class="mini-tag mini-tag-univ">UNIV</span>' : '<span class="plain-dash">-</span>'}</td>
          <td>${isTop ? '<span class="mini-tag mini-tag-top">TOP</span>' : '<span class="plain-dash">-</span>'}</td>
        `;

        tr.addEventListener('click', async () => {
          await focusHospital(index);
        });

        tbody.appendChild(tr);
      });
    }

    function scrollToHospitalRow(index) {
      const tbody = document.getElementById('resultBody');
      const rows = tbody.querySelectorAll('tr.clickable-row');
      const row = rows[index];
      const wrap = document.querySelector('.table-wrap');
      if (!row || !wrap) return;

      const wrapRect = wrap.getBoundingClientRect();
      const rowRect = row.getBoundingClientRect();
      const targetTop =
        wrap.scrollTop +
        (rowRect.top - wrapRect.top) -
        (wrap.clientHeight / 2) +
        (row.clientHeight / 2);

      wrap.scrollTo({
        top: Math.max(0, targetTop),
        behavior: 'smooth'
      });
    }

    function buildPopupHtml(item, isTop) {
      return `
        <div>
          <div style="font-weight:700; margin-bottom:6px;">
            ${escapeHtml(item.name || '')}
            ${isTop ? '<span style="display:inline-block;margin-left:6px;padding:2px 6px;border-radius:999px;background:#ecfccb;color:#3f6212;font-size:11px;font-weight:700;">TOP</span>' : ''}
          </div>
          <div><b>Distance:</b> ${escapeHtml(String(item.distance_km || ''))} km</div>
          <div><b>Rating:</b> ${escapeHtml(String(item.rating || ''))}</div>
          <div><b>Ratings Total:</b> ${escapeHtml(String(item.ratings_total || ''))}</div>
          <div style="margin-top:4px;"><b>Address:</b> ${escapeHtml(item.full_address || item.address || '')}</div>
          <div><b>Phone:</b> ${escapeHtml(item.phone || '정보 없음')}</div>
          <div><b>Hours:</b> ${escapeHtml(item.opening_hours || '정보 없음')}</div>
          <div>
            <b>Website:</b>
            ${item.website
              ? `<a class="detail-link" href="${escapeHtml(item.website)}" target="_blank" rel="noopener noreferrer">Open</a>`
              : '정보 없음'}
          </div>
        </div>
      `;
    }

    function renderMap(data) {
      initMap();

      const centerLat = Number(data.lat);
      const centerLng = Number(data.lng);
      const radiusKm = Number(data.radius || 10);
      const results = data.results || [];
      const topIndexes = getTopHospitalIndexes(results);

      airportMarker = L.marker([centerLat, centerLng], {
        icon: getAirportIcon()
      }).addTo(map).bindPopup(`<b>${escapeHtml(data.icao || 'AIRPORT')}</b><br>Airport Center`);

      radiusCircle = L.circle([centerLat, centerLng], {
        radius: radiusKm * 1000
      }).addTo(map);

      const bounds = L.latLngBounds([[centerLat, centerLng]]);

      results.forEach((item, index) => {
        const lat = Number(item.lat);
        const lng = Number(item.lng);
        if (!isFinite(lat) || !isFinite(lng)) return;

        const isTop = topIndexes.has(index);

        const marker = L.marker([lat, lng], {
          icon: getHospitalIcon(isTop, index === selectedHospitalIndex)
        }).addTo(map);

        marker.on('click', async () => {
          await focusHospital(index);
        });

        hospitalMarkers.push(marker);
        bounds.extend([lat, lng]);
      });

      map.fitBounds(bounds, { padding: [30, 30] });

      setTimeout(() => {
        map.invalidateSize();
      }, 250);
    }

    function setSelectedHospital(index) {
      selectedHospitalIndex = index;
      scrollToHospitalRow(index);
      refreshHospitalMarkerIcons();
      highlightRow(index, true);
    }

    function refreshHospitalMarkerIcons() {
      const topIndexes = getTopHospitalIndexes(currentResults);

      hospitalMarkers.forEach((marker, index) => {
        const isTop = topIndexes.has(index);
        const isSelected = index === selectedHospitalIndex;
        marker.setIcon(getHospitalIcon(isTop, isSelected));
      });
    }

    async function focusHospital(index) {
      if (!hospitalMarkers[index]) return;

      setSelectedHospital(index);

      const marker = hospitalMarkers[index];
      const latlng = marker.getLatLng();

      map.setView(latlng, Math.max(map.getZoom(), 13), { animate: true });
      await loadHospitalDetails(index, true);
    }

    function highlightRow(index, scrollToCenter = false) {
      const rows = document.querySelectorAll('#resultBody tr');
      const tableWrap = document.querySelector('.table-wrap');

      rows.forEach((row, i) => {
        if (i === index) row.classList.add('active-row');
        else row.classList.remove('active-row');
      });

      if (!scrollToCenter || !rows[index] || !tableWrap) return;

      const row = rows[index];
      const wrapRect = tableWrap.getBoundingClientRect();
      const rowRect = row.getBoundingClientRect();
      const currentScroll = tableWrap.scrollTop;
      const offset =
        (rowRect.top - wrapRect.top) -
        (tableWrap.clientHeight / 2) +
        (rowRect.height / 2);

      tableWrap.scrollTo({
        top: Math.max(0, currentScroll + offset),
        behavior: 'smooth'
      });
    }

    function clearMapObjects() {
      if (!map) return;

      if (airportMarker) {
        map.removeLayer(airportMarker);
        airportMarker = null;
      }

      if (radiusCircle) {
        map.removeLayer(radiusCircle);
        radiusCircle = null;
      }

      hospitalMarkers.forEach(marker => map.removeLayer(marker));
      hospitalMarkers = [];
      selectedHospitalIndex = -1;
    }

    function resetTable() {
      const tbody = document.getElementById('resultBody');
      tbody.innerHTML = '<tr><td colspan="6">No data</td></tr>';
    }

    function showLoginView() {
      document.getElementById('loginCard').classList.remove('hidden');
      document.getElementById('searchCard').classList.add('hidden');
    }

    function showSearchView() {
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('searchCard').classList.remove('hidden');
      initMap();

      setTimeout(() => {
        window.scrollTo(0, 0);
        if (map) map.invalidateSize();
      }, 300);

      document.getElementById('icao').focus();
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    document.addEventListener('DOMContentLoaded', () => {
      const passwordEl = document.getElementById('password');
      const icaoEl = document.getElementById('icao');
      const radiusEl = document.getElementById('radius');

      if (passwordEl) {
        passwordEl.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            login();
          }
        });
      }

      if (icaoEl) {
        icaoEl.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            searchHospitals();
          }
        });
      }

      if (radiusEl) {
        radiusEl.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            searchHospitals();
          }
        });
      }
    });

    window.addEventListener('load', () => {
      const savedPassword = localStorage.getItem('hospital_password');
      if (savedPassword) {
        showSearchView();
        setTimeout(() => {
          window.scrollTo(0, 0);
          if (map) map.invalidateSize();
        }, 350);
      } else {
        showLoginView();
      }
    });

    window.addEventListener('resize', () => {
      if (map) {
        setTimeout(() => map.invalidateSize(), 200);
      }
    });
  </script>
</body>
</html>
